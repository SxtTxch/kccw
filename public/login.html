<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KCCW Login</title>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- Global CSS -->
    <link rel="stylesheet" href="/global.css">
    <!-- Page-specific CSS -->
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>
    <div class="top-left-logo">
        <img src="/images/logo_vertical.png" alt="Kraków Logo">
    </div>
    <div class="login-container">

        <h2 class="header-title">Zaloguj się</h2>

        <form id="login-form">
            <div class="form-group">
                <i class="fas fa-envelope input-icon"></i>
                <input type="email" class="form-control" id="email" name="email" placeholder="adres email" required>
            </div>
            <div class="form-group">
                <i class="fas fa-lock input-icon"></i>
                <input type="password" class="form-control" id="password" name="password" placeholder="hasło" required>
            </div>
            <div id="message-box" class="alert" style="display: none;"></div>
            <button type="submit" class="btn btn-primary">Zaloguj się</button>
        </form>

        <div class="switch-to-register">
            Nie masz jeszcze konta? <a href="index.html" id="register-link">Zarejestruj się</a>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-firestore-compat.js"></script>
    <script src="./debug.js"></script>
    <script src="/js/login.js"></script>

    <footer>
        <p>hackyeah 2025 - Krakowskie cyfrowe centrum wolontariatu</p>
        <p class="technologies-used">Powered by: Node.js, Express.js, Capacitor, Bootstrap, Firebase</p>
    </footer>
</body>
</html>
