<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KCCW Register</title>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- Global CSS -->
    <link rel="stylesheet" href="/global.css">
    <!-- Page-specific CSS -->
    <link rel="stylesheet" href="/css/register.css">
</head>
<body>
    <div class="login-container">
        <div class="d-flex justify-content-center align-items-center mb-4">
            <div class="header-icon">
                <img src="/images/logo_horizontal.png" alt="Kraków Logo">
            </div>
        </div>

        <div class="role-switch">
            <span id="volunteer-role" class="active">Wolontariusz</span>
            <span class="separator">|</span>
            <span id="institution-role">Instytucja</span>
        </div>

        <form id="register-form">
            <!-- Volunteer-specific fields (initially visible) -->
            <div id="volunteer-fields">
                <!-- Removed name, lastname, and phone number fields -->
                <div class="form-group">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" class="form-control" id="email" name="email" placeholder="adres email" required>
                </div>
                <div class="form-group">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" class="form-control" id="password" name="password" placeholder="hasło" required>
                </div>
                <div class="form-group">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" class="form-control" id="volunteer-repeat-password" name="volunteerRepeatPassword" placeholder="powtórz hasło" required>
                </div>
            </div>

            <!-- Institution-specific fields (initially hidden) -->
            <div id="institution-fields" style="display: none;">
                <div class="institution-fields-grid">
                    <div class="form-group">
                        <i class="fas fa-building input-icon"></i>
                        <input type="text" class="form-control" id="institution-name" name="institutionName" placeholder="nazwa instytucji" required>
                    </div>
                    <div class="form-group">
                        <i class="fas fa-address-card input-icon"></i>
                        <input type="text" class="form-control" id="contact-person" name="contactPerson" placeholder="osoba kontaktowa" required>
                    </div>
                    <div class="form-group">
                        <i class="fas fa-phone input-icon"></i>
                        <input type="tel" class="form-control" id="institution-phone" name="institutionPhone" placeholder="telefon instytucji" required>
                    </div>
                    <div class="form-group">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" class="form-control" id="institution-email" name="institutionEmail" placeholder="adres email" required>
                    </div>
                    <div class="form-group">
                        <i class="fas fa-map-marker-alt input-icon"></i>
                        <input type="text" class="form-control" id="institution-address" name="institutionAddress" placeholder="adres" required>
                    </div>
                    <div class="form-group">
                        <i class="fas fa-mail-bulk input-icon"></i>
                        <input type="text" class="form-control" id="institution-zip" name="institutionZip" placeholder="kod pocztowy" required>
                    </div>
                </div>
                <div class="form-group">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" class="form-control" id="institution-password" name="institutionPassword" placeholder="hasło" required>
                </div>
                <div class="form-group">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" class="form-control" id="institution-repeat-password" name="institutionRepeatPassword" placeholder="powtórz hasło" required>
                </div>
            </div>
            <div id="message-box" class="alert" style="display: none;"></div>
            <button type="submit" class="btn btn-primary">Zarejestruj się</button>
        </form>

        <div class="switch-to-login">
            Posiadasz już konto? <a href="login.html" id="login-link">Zaloguj się</a>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-firestore-compat.js"></script>
    <script src="./debug.js"></script>
    <script src="/js/register.js"></script>

    <footer>
        <p>hackyeah 2025 - Krakowskie cyfrowe centrum wolontariatu</p>
        <p class="technologies-used">Powered by: Node.js, Express.js, Capacitor, Bootstrap, Firebase</p>
    </footer>
</body>
</html>
